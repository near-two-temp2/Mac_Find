<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'unsafe-inline';"
    />
    <title>MacFind — Road C (TS hybrid)</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f6f7;
        --panel: #ffffff;
        --line: #e2e2e6;
        --text: #1d1d1f;
        --sub: #6b6b70;
        --accent: #2f6fed;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1e1e20;
          --panel: #2a2a2d;
          --line: #3a3a3e;
          --text: #f2f2f5;
          --sub: #a0a0a6;
          --accent: #5a8cff;
        }
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        font: 13px -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      #app { display: flex; flex-direction: column; height: 100vh; }
      header {
        padding: 34px 16px 10px;
        -webkit-app-region: drag;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }
      .searchbar { display: flex; gap: 8px; align-items: center; -webkit-app-region: no-drag; }
      #q {
        flex: 1;
        font-size: 15px;
        padding: 9px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--bg);
        color: var(--text);
        outline: none;
      }
      #q:focus { border-color: var(--accent); }
      select, button {
        font-size: 13px;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--bg);
        color: var(--text);
        cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: default; }
      .statusbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 16px;
        font-size: 12px;
        color: var(--sub);
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }
      .badge {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 10px;
        font-weight: 600;
        text-transform: uppercase;
      }
      .badge-index { background: #d8f0dc; color: #1a7a34; }
      .badge-searchfs { background: #fbe7c6; color: #9a6b00; }
      .badge-none { background: #f0d4d4; color: #9a2020; }
      ul#results { list-style: none; margin: 0; padding: 0; overflow-y: auto; flex: 1; }
      li.row {
        display: grid;
        grid-template-columns: 22px minmax(120px, 1fr) 2fr auto;
        gap: 10px;
        align-items: center;
        padding: 7px 16px;
        border-bottom: 1px solid var(--line);
      }
      li.row:hover { background: rgba(127, 127, 127, 0.08); }
      .name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .dir { color: var(--sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; direction: rtl; text-align: left; }
      .actions { display: flex; gap: 6px; }
      .actions button { padding: 4px 9px; font-size: 12px; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <div class="searchbar">
          <input id="q" type="text" placeholder="Search files…" autofocus spellcheck="false" />
          <select id="filter" title="Type filter">
            <option value="all">All</option>
            <option value="files">Files</option>
            <option value="dirs">Folders</option>
          </select>
          <button id="reindex" title="Build / rebuild the binary index">Build index</button>
        </div>
      </header>
      <div class="statusbar">
        <div id="status">Type to search.</div>
        <span id="mode" class="badge badge-none">—</span>
      </div>
      <ul id="results"></ul>
    </div>
    <script src="renderer.js"></script>
  </body>
</html>
