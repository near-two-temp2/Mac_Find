name: build-b-go

# Road_B · Go — Fyne GUI + self-built binary index + fzf scoring.
# Authoritative build: GitHub Actions macos-latest runner (local dev machine
# is old macOS and does not compile).

on:
  push:
    paths:
      - "Road_B/Src_GO/**"
      - ".github/workflows/build-b-go.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: Road_B/Src_GO

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          # go.sum is generated by the "Resolve modules" step below (it is not
          # committed), so key the module cache off go.mod which always exists.
          cache-dependency-path: Road_B/Src_GO/go.mod

      # Fyne needs cgo on macOS (it links against Cocoa/OpenGL).
      - name: Resolve modules
        env:
          CGO_ENABLED: "1"
        run: |
          go mod tidy
          go mod download

      - name: Vet
        env:
          CGO_ENABLED: "1"
        run: go vet ./...

      - name: Unit tests (index + search engine)
        env:
          CGO_ENABLED: "1"
        run: go test ./internal/...

      # Plain binary build — proves the whole program (GUI + CLI) compiles.
      - name: Build binary
        env:
          CGO_ENABLED: "1"
        run: |
          mkdir -p dist
          go build -o dist/macfind ./cmd/macfind
          ./dist/macfind --help || true

      # CLI smoke test: build a small index over the repo and query it. This
      # exercises the index writer, the mmap reader and the two-phase search
      # without needing a display.
      - name: CLI smoke test (index + search)
        env:
          CGO_ENABLED: "1"
        run: |
          ./dist/macfind index -o dist/smoke.idx -root . -skip-hidden
          echo "--- search: 'go' ---"
          ./dist/macfind search -i dist/smoke.idx -n 20 go
          echo "--- search: 'main' ---"
          ./dist/macfind search -i dist/smoke.idx -n 20 main

      # Package the .app bundle with the Fyne packaging tool. Flag names have
      # drifted across fyne CLI versions, so we run it from the command's own
      # directory (packages the current dir; no --src needed) and try both the
      # single-dash and double-dash icon flag. If fyne packaging fails for any
      # reason, the next step assembles a .app by hand from the built binary,
      # so the artifact always contains a runnable bundle.
      - name: Install fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Package .app bundle (fyne)
        continue-on-error: true
        env:
          CGO_ENABLED: "1"
        run: |
          FYNE="$(go env GOPATH)/bin/fyne"
          cp Icon.png cmd/macfind/Icon.png
          cd cmd/macfind
          "$FYNE" package -os darwin -name macfind -appID com.macfind.roadb.go -icon Icon.png -release \
            || "$FYNE" package -os darwin -name macfind -appID com.macfind.roadb.go -icon Icon.png \
            || echo "fyne package failed; will fall back to manual bundle"
          cd ../..
          mkdir -p dist
          for cand in cmd/macfind/macfind.app macfind.app; do
            if [ -d "$cand" ]; then cp -R "$cand" dist/macfind.app; break; fi
          done
          ls -la dist || true

      - name: Assemble .app fallback if needed
        env:
          CGO_ENABLED: "1"
        run: |
          mkdir -p dist
          if [ ! -d dist/macfind.app ]; then
            echo "fyne bundle absent — assembling .app manually from the binary"
            APP=dist/macfind.app
            mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
            cp dist/macfind "$APP/Contents/MacOS/macfind"
            cp Icon.png "$APP/Contents/Resources/Icon.png"
            cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>macfind</string>
            <key>CFBundleDisplayName</key><string>macfind (Road B)</string>
            <key>CFBundleExecutable</key><string>macfind</string>
            <key>CFBundleIdentifier</key><string>com.macfind.roadb.go</string>
            <key>CFBundleIconFile</key><string>Icon.png</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>0.1.0</string>
            <key>CFBundleVersion</key><string>0.1.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST
            echo "APPL????" > "$APP/Contents/PkgInfo"
          fi
          ls -la dist/macfind.app/Contents

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: road-b-go-app
          path: |
            Road_B/Src_GO/dist/macfind.app
            Road_B/Src_GO/dist/macfind
          if-no-files-found: warn
