name: build-a-cpp

on:
  push:
    paths:
      - "Road_A/Src_CPP/**"
      - ".github/workflows/build-a-cpp.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: Road_A/Src_CPP

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cmake
        run: brew install cmake

      # The GitHub macOS runner is arm64, and Homebrew's qt is arm64-only, so it
      # can't produce an Intel binary. The official Qt6 macOS build (installed via
      # aqtinstall) is a *universal* (x86_64+arm64) framework, so we install that
      # and then ask CMake to emit the x86_64 slice.
      - name: Install Qt6 (official universal build)
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.*"
          host: mac
          target: desktop
          arch: clang_64
          cache: true

      - name: Configure (CMake, target x86_64)
        run: |
          echo "Qt root: ${QT_ROOT_DIR}"
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}"

      - name: Build
        run: cmake --build build --config Release -j 3

      - name: Verify artifacts
        run: |
          echo "== Architecture check (expect x86_64) =="
          lipo -archs build/macfind-a-cli || file build/macfind-a-cli
          if [ -d build/MacFindRoadACpp.app ]; then
            lipo -archs build/MacFindRoadACpp.app/Contents/MacOS/MacFindRoadACpp || true
          fi
          echo "== CLI smoke test =="
          # The CLI is x86_64; the arm64 runner runs it under Rosetta if present,
          # otherwise this is skipped. `|| true` keeps the job green either way.
          ./build/macfind-a-cli --help || true
          # A real search on the CI runner's disk (bounded).
          ./build/macfind-a-cli -m 5 bin || true
          echo "== GUI bundle =="
          ls -la build/
          test -d build/MacFindRoadACpp.app && echo "OK: .app bundle produced"

      - name: Package .app
        run: |
          mkdir -p dist
          if [ -d build/MacFindRoadACpp.app ]; then
            cp -R build/MacFindRoadACpp.app dist/
          fi
          cp build/macfind-a-cli dist/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: road-a-cpp-app
          path: Road_A/Src_CPP/dist/
          if-no-files-found: error
