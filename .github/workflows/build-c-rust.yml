name: build-c-rust

# Road_C (Rust) — 混合引擎 GUI（egui/eframe）。
# 权威构建在 GitHub Actions 的 macOS runner 上完成；开发机不本地编译。

on:
  push:
    paths:
      - "Road_C/Src_RUST/**"
      - ".github/workflows/build-c-rust.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build (macos-latest)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: Road_C/Src_RUST

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Show versions
        run: |
          rustc --version
          cargo --version

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Road_C/Src_RUST/target
          key: cargo-c-rust-${{ runner.os }}-${{ hashFiles('Road_C/Src_RUST/Cargo.toml') }}
          restore-keys: |
            cargo-c-rust-${{ runner.os }}-

      - name: Build (release)
        run: cargo build --release --bins

      - name: Unit tests (engine/index/fuzzy/bitmask)
        run: cargo test --release

      - name: CLI smoke test (index → search → doctor)
        run: |
          set -euxo pipefail
          BIN=target/release/haifind-c-cli
          # 建一个小索引（只遍历本目录 src/，秒级完成）。
          "$BIN" index --root src --out /tmp/smoke.idx
          # 用该索引搜索（应命中 main.rs 等）。
          "$BIN" search --index /tmp/smoke.idx --limit 20 main
          # 引擎自检（打印索引/searchfs 能力，永不失败）。
          "$BIN" doctor

      - name: Package .app bundle
        run: |
          set -euxo pipefail
          APP="dist/HaiFind-C.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp target/release/haifind-c-gui "$APP/Contents/MacOS/HaiFind-C"
          cp target/release/haifind-c-cli "$APP/Contents/MacOS/haifind-c-cli"
          cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>HaiFind-C</string>
            <key>CFBundleDisplayName</key><string>Mac Hai Find — Road_C (Rust)</string>
            <key>CFBundleIdentifier</key><string>com.haifind.c-rust</string>
            <key>CFBundleVersion</key><string>0.1.0</string>
            <key>CFBundleShortVersionString</key><string>0.1.0</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleExecutable</key><string>HaiFind-C</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST
          echo "APPL????" > "$APP/Contents/PkgInfo"
          ls -R dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: road-c-rust-app
          path: |
            Road_C/Src_RUST/dist/HaiFind-C.app
            Road_C/Src_RUST/target/release/haifind-c-gui
            Road_C/Src_RUST/target/release/haifind-c-cli
          if-no-files-found: error
