name: build-c-cpp

on:
  push:
    paths:
      - "Road_C/Src_CPP/**"
      - ".github/workflows/build-c-cpp.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: Road_C/Src_CPP

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cmake
        run: brew install cmake

      # The arm64 runner's Homebrew qt is arm64-only, so it can't produce an Intel
      # binary. The official Qt6 macOS build (via aqtinstall) is a *universal*
      # (x86_64+arm64) framework; install that and let CMake emit the x86_64 slice.
      - name: Install Qt6 (official universal build)
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.*"
          host: mac
          target: desktop
          arch: clang_64
          cache: true

      - name: Configure (CMake, target x86_64)
        run: |
          echo "Qt root: ${QT_ROOT_DIR}"
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}"

      - name: Build
        run: cmake --build build --config Release -j 3

      - name: Verify artifacts (hybrid smoke test)
        run: |
          echo "== Architecture check (expect x86_64) =="
          lipo -archs build/macfind-c-cli || file build/macfind-c-cli
          if [ -d build/MacFindRoadCCpp.app ]; then
            lipo -archs build/MacFindRoadCCpp.app/Contents/MacOS/MacFindRoadCCpp || true
          fi

          # The CLI is x86_64; on the arm64 runner it runs under Rosetta if
          # present, otherwise the runtime steps are skipped. Every invocation is
          # guarded with `|| true` so the job stays green regardless.
          echo "== CLI help =="
          ./build/macfind-c-cli --help || true

          echo "== Before any index: search should fall back to searchfs =="
          # No index built yet -> the coordinator uses the searchfs() fallback.
          ./build/macfind-c-cli info || true
          ./build/macfind-c-cli search -m 5 bin || true

          echo "== Build a small index over a bounded root =="
          # Index just the runner's HOME (fast) so the index path is exercised.
          ./build/macfind-c-cli index "$HOME" || true
          ./build/macfind-c-cli info || true

          echo "== After index: search should use the index engine =="
          ./build/macfind-c-cli search -m 10 lib || true

          echo "== GUI bundle =="
          ls -la build/
          test -d build/MacFindRoadCCpp.app && echo "OK: .app bundle produced"

      - name: Package .app
        run: |
          mkdir -p dist
          if [ -d build/MacFindRoadCCpp.app ]; then
            cp -R build/MacFindRoadCCpp.app dist/
          fi
          cp build/macfind-c-cli dist/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: road-c-cpp-app
          path: Road_C/Src_CPP/dist/
          if-no-files-found: error
