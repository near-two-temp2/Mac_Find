name: build-c-go

# Road_C · Go — 混合完整版 GUI (Fyne)。仅在本实现目录或本 workflow 变更时触发。
on:
  push:
    paths:
      - "Road_C/Src_GO/**"
      - ".github/workflows/build-c-go.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: Road_C/Src_GO
    env:
      CGO_ENABLED: "1" # Fyne (OpenGL/cgo) 与 searchfs cgo 兜底都需要

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: Road_C/Src_GO/go.sum

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Unit tests (bitmask / fuzzy / index)
        run: go test ./internal/...

      # Cross-compile the shipped CLI to Intel (x86_64). macos-latest is an
      # arm64 runner, so a default build produces an arm64 binary that won't
      # launch on Intel Macs. clang/SDK are universal, so `clang -arch x86_64`
      # plus matching CGO flags emit x86_64 from the arm64 host; the result runs
      # here via the runner's preinstalled Rosetta 2.
      - name: CLI smoke test (hybrid engine, no GUI) — x86_64
        env:
          GOARCH: amd64
          CGO_CFLAGS: "-arch x86_64 -mmacosx-version-min=12.0"
          CGO_LDFLAGS: "-arch x86_64 -mmacosx-version-min=12.0"
          CC: "clang -arch x86_64"
        run: |
          go build -o macfind-cli ./cmd/macfind
          file macfind-cli
          file macfind-cli | grep -q x86_64
          ./macfind-cli selftest

      # Install the fyne tool as a host-native (arm64) binary — no cross env.
      - name: Install Fyne packaging tool
        env:
          CGO_ENABLED: "0"
        run: go install fyne.io/fyne/v2/cmd/fyne@v2.6.3

      - name: Package .app (Fyne GUI) — x86_64
        # v2.6.x flag names: -appID (camelCase), -sourceDir (not -app-id / -src).
        # fyne package requires an icon; Icon.png ships in cmd/macfind.
        # NOTE: in fyne v2.6.x the tool chdir's into -sourceDir before resolving
        # -icon, so the icon path must be RELATIVE TO -sourceDir. Passing
        # `./cmd/macfind/Icon.png` made it look under cmd/macfind/cmd/macfind and
        # fail with "Missing application icon". We therefore package from inside
        # cmd/macfind and pass a bare `Icon.png` (matching FyneApp.toml).
        # `fyne package` runs its own `go build`; the cross env makes the
        # executable inside the .app x86_64 too.
        # minos: append -mmacosx-version-min=12.0 so the executable inside the
        # .app is tagged LC_BUILD_VERSION minos 12.0 and launches on the Intel
        # macOS 12 dev box (Fyne/Go otherwise inherit the runner's high SDK).
        env:
          GOARCH: amd64
          CGO_CFLAGS: "-arch x86_64 -mmacosx-version-min=12.0"
          CGO_LDFLAGS: "-arch x86_64 -mmacosx-version-min=12.0"
          CC: "clang -arch x86_64"
        working-directory: Road_C/Src_GO/cmd/macfind
        run: |
          "$(go env GOPATH)/bin/fyne" package \
            -os darwin \
            -name MacFindRoadCGo \
            -appID com.macfind.roadc.go \
            -icon Icon.png
          ls -la

      - name: Stage artifacts
        # The .app is produced inside cmd/macfind (the package step chdir'd
        # there), i.e. Road_C/Src_GO/cmd/macfind/MacFindRoadCGo.app. A previous
        # `find . -maxdepth 2` from Road_C/Src_GO missed it (it sits at depth 3,
        # ./cmd/macfind/MacFindRoadCGo.app), so only the bare CLI got staged.
        # Reference the .app by its known path and hard-fail if it is absent.
        run: |
          mkdir -p dist
          APP="cmd/macfind/MacFindRoadCGo.app"
          if [ ! -d "$APP" ]; then
            echo "::error::Expected $APP but fyne package did not produce it"
            echo "--- contents of cmd/macfind ---"; ls -la cmd/macfind || true
            exit 1
          fi
          cp -R "$APP" dist/
          cp macfind-cli dist/ || true
          echo "--- dist tree ---"; ls -la dist
          echo "--- .app executable(s) ---"; ls -la dist/MacFindRoadCGo.app/Contents/MacOS
          # 确认 .app 内可执行是 Intel(x86_64) 且 minos ≤ 12（能在 macOS 12 跑）
          APPBIN="$(ls dist/MacFindRoadCGo.app/Contents/MacOS/* | head -1)"
          file "$APPBIN"
          lipo -archs "$APPBIN"
          lipo -archs "$APPBIN" | grep -qw x86_64
          echo "--- minos (LC_BUILD_VERSION / LC_VERSION_MIN_MACOSX) ---"
          otool -l "$APPBIN" | grep -A3 -E "LC_BUILD_VERSION|LC_VERSION_MIN_MACOSX" | grep -E "minos|version" || true
          file dist/macfind-cli || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: road-c-go-app
          path: Road_C/Src_GO/dist
          if-no-files-found: error
