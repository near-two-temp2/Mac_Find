name: build-c-swift

# Road_C / Swift — hybrid flagship (SwiftUI GUI + mmap index + searchfs fallback).
# Authoritative build runs on GitHub Actions' macOS runner; the dev machine
# (macOS 12) never compiles locally.

on:
  push:
    paths:
      - "Road_C/Src_SWIFT/**"
      - ".github/workflows/build-c-swift.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    # Dev machine is macOS 12.7.6 (Intel). Pin the deployment target to 12.0 so
    # every slice of the universal binary (and the .app's LSMinimumSystemVersion)
    # allows launching there — otherwise LaunchServices refuses with -10825.
    env:
      MACOSX_DEPLOYMENT_TARGET: "12.0"
    defaults:
      run:
        working-directory: Road_C/Src_SWIFT

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version || true

      # Build the pure-logic engine + GUI executable in release.
      # Universal so the artifact runs on both Intel and Apple Silicon Macs.
      - name: swift build (release, universal x86_64 + arm64)
        run: swift build -c release --arch x86_64 --arch arm64

      # Headless unit tests of the engine (index build → mmap → fzf ordering).
      - name: swift test
        run: swift test

      # Self-test subcommand + a real search against the runner's own volume.
      - name: CLI smoke (self-test + live search)
        run: |
          BIN="$(swift build -c release --arch x86_64 --arch arm64 --show-bin-path)/machaifind-c"
          echo "Binary: $BIN"
          "$BIN" --self-test
          # Build a tiny index of the repo and query it end-to-end.
          "$BIN" index --root "$PWD/Sources"
          "$BIN" search swift --limit 5 || true
          # Exercise the searchfs() fallback path directly.
          "$BIN" search usr --dirs-only --limit 5 --fallback || true

      # Assemble a runnable .app bundle around the SwiftPM executable. SwiftPM
      # emits a bare Mach-O; we wrap it with an Info.plist so it launches as a
      # GUI app (LSUIElement=false, regular activation).
      - name: Package .app bundle
        run: |
          set -euxo pipefail
          BIN="$(swift build -c release --arch x86_64 --arch arm64 --show-bin-path)/machaifind-c"
          APP="build/MacHaiFindC.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "$BIN" "$APP/Contents/MacOS/machaifind-c"
          cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>            <string>MacHaiFindC</string>
            <key>CFBundleDisplayName</key>     <string>Mac Hai Find — Road C</string>
            <key>CFBundleIdentifier</key>      <string>com.machaifind.c</string>
            <key>CFBundleVersion</key>         <string>1.0</string>
            <key>CFBundleShortVersionString</key><string>1.0</string>
            <key>CFBundlePackageType</key>     <string>APPL</string>
            <key>CFBundleExecutable</key>      <string>machaifind-c</string>
            <key>LSMinimumSystemVersion</key>  <string>12.0</string>
            <key>NSHighResolutionCapable</key> <true/>
            <key>LSUIElement</key>             <false/>
          </dict>
          </plist>
          PLIST
          # Ad-hoc sign so it launches without a Developer ID (CI artifact only).
          codesign --force --deep --sign - "$APP" || true
          echo "Bundle assembled:"
          find "$APP" -type f
          # Prove the shipped binary carries both slices.
          lipo -info "$APP/Contents/MacOS/machaifind-c"

      # Confirm the shipped app targets macOS 12 (opens on the Intel dev Mac).
      - name: Verify deployment target (expect 12.0)
        run: |
          set -euo pipefail
          APP="build/MacHaiFindC.app"
          echo "== Info.plist LSMinimumSystemVersion =="
          plutil -p "$APP/Contents/Info.plist" | grep -i LSMinimumSystemVersion
          echo "== Mach-O per-slice minimum OS (expect 12.0 for each slice) =="
          for arch in x86_64 arm64; do
            echo "-- $arch --"
            otool -arch "$arch" -l "$APP/Contents/MacOS/machaifind-c" \
              | grep -A4 -E 'LC_BUILD_VERSION|LC_VERSION_MIN_MACOSX' \
              | grep -iE 'minos|version' || true
          done

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: road-c-swift-app
          path: Road_C/Src_SWIFT/build/MacHaiFindC.app
          if-no-files-found: error
