name: build-b-python

# Road_B · Python — PyQt6 GUI + self-built binary index + fzf engine.
#
# Intel (x86_64) build: runs on the native Intel runner `macos-15-intel`
# (GitHub's last x86_64 macOS image, supported until Aug 2027). A native
# Intel host makes setup-python install x86_64 CPython, pip pull x86_64
# PyQt6-Qt6 + numpy wheels, and PyInstaller emit an x86_64 .app that opens
# on Intel Macs. (macos-latest is arm64 and would yield an arm64 .app.)

on:
  push:
    paths:
      - "Road_B/Src_PYTHON/**"
      - ".github/workflows/build-b-python.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15-intel
    defaults:
      run:
        working-directory: Road_B/Src_PYTHON

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify toolchain is x86_64
        run: |
          echo "uname -m: $(uname -m)"
          python -c "import platform; print('python arch:', platform.machine())"
          test "$(python -c 'import platform;print(platform.machine())')" = "x86_64"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 numpy pyinstaller

      - name: Engine smoke test (headless)
        run: |
          python -m mac_find_b.cli smoke --max 5000

      - name: Build .app with PyInstaller
        run: |
          pyinstaller \
            --noconfirm \
            --windowed \
            --name "MacFindB" \
            --collect-all PyQt6 \
            --collect-all numpy \
            app.py

      - name: Show build output
        run: |
          ls -la dist
          ls -la "dist/MacFindB.app/Contents/MacOS" || true

      - name: Verify bundle is x86_64
        run: |
          BIN="dist/MacFindB.app/Contents/MacOS/MacFindB"
          file "$BIN"
          ARCHS="$(lipo -archs "$BIN")"
          echo "archs: $ARCHS"
          echo "$ARCHS" | grep -q x86_64 || (echo "bundle is not x86_64" && exit 1)
          echo "$ARCHS" | grep -q arm64 && echo "note: bundle is universal2 (also runs on Intel)" || true

      - name: Zip the .app
        run: |
          cd dist
          zip -ry MacFindB-app.zip "MacFindB.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: road-b-python-app
          path: Road_B/Src_PYTHON/dist/MacFindB-app.zip
          if-no-files-found: error
