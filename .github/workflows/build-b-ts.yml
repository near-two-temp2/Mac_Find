name: build-b-ts

# Road_B · TypeScript (Electron, self-built binary index + fzf scoring)
# Target arch: x86_64 (Intel). The macos runner is arm64; we ship an Intel
# .app so it opens on users' Intel Macs. Road_B has NO native addon (the
# index engine is pure JS/TypeScript — no binding.gyp), so there is nothing
# to cross-compile; making the Electron package x64 is sufficient.

on:
  push:
    paths:
      - "Road_B/Src_TS/**"
      - ".github/workflows/build-b-ts.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: Road_B/Src_TS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: Road_B/Src_TS/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile (tsc + copy assets)
        run: npm run compile

      - name: Smoke test (index + search over own sources)
        run: npm run smoke

      - name: Package macOS app (electron-builder) — x64
        run: npm run package -- --x64

      - name: List build output
        if: always()
        run: |
          ls -laR release || true
          echo "--- Electron framework arch (must be x86_64) ---"
          find release -name "Electron Framework" -maxdepth 6 -exec lipo -archs {} \; 2>/dev/null || true
          find release -name "*.app" -maxdepth 3 -exec sh -c 'lipo -archs "$1/Contents/MacOS/"* 2>/dev/null' _ {} \; || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: road-b-ts-app
          path: |
            Road_B/Src_TS/release/*.dmg
            Road_B/Src_TS/release/mac*/**
          if-no-files-found: warn
