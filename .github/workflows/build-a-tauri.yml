name: build-a-tauri

# Road_A · Tauri (Rust backend + TypeScript frontend)
# Builds a macOS Tauri v2 desktop app whose Rust backend calls the searchfs()
# syscall for index-free, real-time filename search. Authoritative build runs
# on GitHub Actions macos-latest (dev host is macOS 12 and does not build
# locally). Triggers only on changes to this implementation.

on:
  push:
    paths:
      - "Road_A/Src_TAURI/**"
      - ".github/workflows/build-a-tauri.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: Road_A/Src_TAURI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version
          node --version
          npm --version
          xcodebuild -version || true

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Road_A/Src_TAURI/src-tauri/target
          key: ${{ runner.os }}-cargo-a-tauri-${{ hashFiles('Road_A/Src_TAURI/src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-a-tauri-

      - name: Install JS dependencies
        run: npm ci || npm install

      - name: Generate app icons (.icns etc.) from source PNG
        run: npm run tauri icon src-tauri/icons/icon.png

      - name: Build front end (produces dist/ that tauri_build needs)
        # `tauri::generate_context!()` (compiled into the lib) reads
        # tauri.conf.json's frontendDist (../dist), so dist/ must exist before
        # any cargo build of the crate — including the CLI smoke test below.
        run: npm run build

      - name: CLI smoke test (searchfs engine self-test)
        run: |
          cargo build --release --manifest-path src-tauri/Cargo.toml --bin mac-find-cli
          ./src-tauri/target/release/mac-find-cli --help
          # Engine must run end-to-end without panicking. Zero hits is a pass:
          # the CI runner may lack Full Disk Access.
          ./src-tauri/target/release/mac-find-cli --self-test

      - name: Build Tauri app (.app + .dmg)
        run: npm run tauri build

      - name: List build output
        run: |
          echo "--- bundle/ ---"
          find src-tauri/target/release/bundle -maxdepth 3 \( -name "*.app" -o -name "*.dmg" \) -print || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: road-a-tauri-app
          path: |
            Road_A/Src_TAURI/src-tauri/target/release/bundle/macos/*.app
            Road_A/Src_TAURI/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 14
