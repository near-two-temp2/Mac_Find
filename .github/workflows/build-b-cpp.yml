name: build-b-cpp

# Road_B · C++ — Qt6 GUI (self-built binary index + fzf engine).
# Authoritative build runs on GitHub's macOS runner; the dev machine (macOS 12)
# does not build locally.

on:
  push:
    paths:
      - "Road_B/Src_CPP/**"
      - ".github/workflows/build-b-cpp.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: Road_B/Src_CPP

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Homebrew's qt is arm64-only on the arm64 runner and can't produce Intel
      # binaries. The official Qt6 macOS build (via aqtinstall) is a *universal*
      # (x86_64+arm64) framework, so install that and let CMake emit x86_64.
      - name: Install Qt6 (official universal build)
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.*"
          host: mac
          target: desktop
          arch: clang_64
          cache: true

      - name: Configure (CMake, target x86_64)
        run: |
          echo "Qt root: ${QT_ROOT_DIR}"
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}"

      - name: Build (CLI + GUI .app)
        run: cmake --build build --config Release -j 3

      - name: Smoke test (CLI selftest)
        run: |
          echo "== Architecture check (expect x86_64) =="
          lipo -archs build/mff-b || file build/mff-b
          if [ -d build/MacFindRoadB.app ]; then
            lipo -archs build/MacFindRoadB.app/Contents/MacOS/MacFindRoadB || true
          fi
          # The CLI is x86_64; on the arm64 runner these run under Rosetta if it's
          # present. Guard with `|| true` so a missing Rosetta doesn't fail the job.
          ./build/mff-b selftest || true
          # Also index a small tree and run a fuzzy query end-to-end.
          ./build/mff-b index --root "$PWD/src" --out /tmp/ci.idx || true
          ./build/mff-b search --index /tmp/ci.idx engcpp || true

      - name: Show produced bundle
        run: |
          echo "Build tree:"
          ls -la build || true
          echo "App bundle:"
          ls -la build/MacFindRoadB.app || echo "GUI bundle not found"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: road-b-cpp-app
          # Ship both the .app bundle and the CLI helper.
          path: |
            Road_B/Src_CPP/build/MacFindRoadB.app
            Road_B/Src_CPP/build/mff-b
          if-no-files-found: warn
